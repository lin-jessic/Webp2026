<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hw2</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }

        button {
            margin-top: 10px;
            padding: 4px 10px;
            cursor: pointer;
        }

        .course-link {
            color: black;
            font-weight: normal;
            text-decoration: none;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            overflow: auto;
        }

        .modal-content {
            position: relative;
            width: 80%;
            max-width: 900px;
            height: 85vh;
            margin: 30px auto;
            background-color: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #f2f2f2;
            border-bottom: 1px solid #ddd;
            font-family: Arial, Helvetica, sans-serif;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close-btn {
            font-size: 24px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
        }

        .close-btn:hover {
            color: red;
        }

        #courseFrame {
            width: 100%;
            flex: 1;
            border: none;
        }
    </style>
</head>
<body>
    <h1>資工選課表</h1>

    <table id="csie">
        <tr>
            <th>開課單位</th>
            <th>課程名稱</th>
            <th>授課教師</th>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('物件導向軟體設計', 'https://catalog.cgu.edu.tw/coursedata?sectionid=A2337')">
                    物件導向軟體設計
                </span>
            </td>
            <td id="teacher1">黃崇源</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('計算機網路實驗', 'https://catalog.cgu.edu.tw/coursedata?sectionid=61602')">
                    計算機網路實驗
                </span>
            </td>
            <td>李春良</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('作業系統實務', 'https://catalog.cgu.edu.tw/coursedata?sectionid=A2338')">
                    作業系統實務
                </span>
            </td>
            <td>張哲維</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('生物統計', 'https://catalog.cgu.edu.tw/coursedata?sectionid=71796')">
                    生物統計
                </span>
            </td>
            <td>陳光武</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('通訊系統', 'https://catalog.cgu.edu.tw/coursedata?sectionid=A2339')">
                    通訊系統
                </span>
            </td>
            <td>陳仁暉</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td>
                <span class="course-link"
                      onclick="openPopover('軟硬體專題(2)', 'https://catalog.cgu.edu.tw/coursedata?sectionid=56665')">
                    軟硬體專題(2)
                </span>
            </td>
            <td>魏志達</td>
        </tr>
    </table>

    <button onclick="changeResult()">Change</button>

    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">課程詳細資料</div>
                <span class="close-btn" onclick="closePopover()">&times;</span>
            </div>
            <iframe id="courseFrame" src=""></iframe>
        </div>
    </div>

    <script>
        function changeResult() {
            var myTable = document.getElementById("csie");
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }

        function openPopover(courseName, url) {
            document.getElementById("modalTitle").innerHTML = courseName + " - 課程詳細資料";
            document.getElementById("courseFrame").src = url;
            document.getElementById("courseModal").style.display = "block";
        }

        function closePopover() {
            document.getElementById("courseModal").style.display = "none";
            document.getElementById("courseFrame").src = "";
        }

        window.onclick = function(event) {
            var modal = document.getElementById("courseModal");
            if (event.target == modal) {
                closePopover();
            }
        }
    </script>
</body>
</html>
