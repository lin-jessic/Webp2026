<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW4</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous"
    >

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }

        #keyword {
            width: 130px;
            height: 40px;
            font-size: 24px;
            padding: 4px 8px;
            border: 1px solid #666;
        }

        #csie {
            width: 100%;
            table-layout: fixed;
        }

        #csie thead tr {
            background-color: #10b981;
            color: white;
        }

        #csie th,
        #csie td {
            vertical-align: top;
            word-wrap: break-word;
        }

        #csie th:nth-child(1),
        #csie td:nth-child(1) {
            width: 45%;
        }

        #csie th:nth-child(2),
        #csie td:nth-child(2) {
            width: 30%;
        }

        #csie th:nth-child(3),
        #csie td:nth-child(3) {
            width: 25%;
        }

        .pager {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pager button {
            padding: 4px 10px;
            border: 1px solid #888;
            background-color: #f5f5f5;
            cursor: pointer;
        }

        .pager button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #page-info {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>景點觀光展覽資訊</h1>
        <input type="text" id="keyword" onchange="searchData()" />
    </div>

    <table id="csie" class="table table-striped table-hover">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody id="csie-body">
        </tbody>
    </table>

    <div class="pager">
        <button id="prev-btn" onclick="prevPage()">上一頁</button>
        <span id="page-info">1 / 1 頁</span>
        <button id="next-btn" onclick="nextPage()">下一頁</button>
    </div>

    <script>
        var openUrl =
            "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

        var allData = [];
        var filteredData = [];
        var currentPage = 1;
        var perPage = 10;

        var xhr = new XMLHttpRequest();
        xhr.open("GET", openUrl, true);
        xhr.send();

        xhr.onreadystatechange = function () {
            if (this.readyState == 4 && this.status == 200) {
                allData = JSON.parse(this.responseText);
                filteredData = allData;
                currentPage = 1;
                renderTable();
            }
        };

        function renderTable() {
            var tbody = document.getElementById("csie-body");
            tbody.innerHTML = "";

            var totalPages = Math.ceil(filteredData.length / perPage);
            if (totalPages == 0) {
                totalPages = 1;
            }

            if (currentPage > totalPages) {
                currentPage = totalPages;
            }

            var startIndex = (currentPage - 1) * perPage;
            var endIndex = startIndex + perPage;
            var pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach(function (data) {
                var row = tbody.insertRow(-1);

                var title = data["title"] ? data["title"] : "";
                var location = "";
                var price = "";

                if (data["showInfo"] && data["showInfo"].length > 0) {
                    location = data["showInfo"][0]["location"] ? data["showInfo"][0]["location"] : "";
                    price = data["showInfo"][0]["price"] ? data["showInfo"][0]["price"] : "";
                }

                row.insertCell(0).innerHTML = title;
                row.insertCell(1).innerHTML = location;
                row.insertCell(2).innerHTML = price;
            });

            document.getElementById("page-info").innerHTML = currentPage + " / " + totalPages + " 頁";
            document.getElementById("prev-btn").disabled = (currentPage == 1);
            document.getElementById("next-btn").disabled = (currentPage == totalPages || filteredData.length == 0);
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            var totalPages = Math.ceil(filteredData.length / perPage);
            if (totalPages == 0) {
                totalPages = 1;
            }

            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function searchData() {
            var keyword = document.getElementById("keyword").value.trim();

            if (keyword == "") {
                filteredData = allData;
            } else {
                filteredData = allData.filter(function (data) {
                    return data["title"] && data["title"].indexOf(keyword) !== -1;
                });
            }

            currentPage = 1;
            renderTable();
        }
    </script>
</body>
</html>
