<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- 設定字元編碼 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 響應式設定 -->
    <title>ex8 - Ajax example</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous"
    >

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 10px 0;
            padding: 0;
        }

        /* 讓表頭變成和老師截圖很像的綠色 */
        #csie thead tr {
            background-color: #10b981;
            color: white;
        }

        /* 加強表格外觀，讓它更像截圖 */
        #csie {
            width: 100%;
        }

        #csie th,
        #csie td {
            vertical-align: top;
        }

        .btn-area {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>景點觀光展覽資訊</h1>

    <table id="csie" class="table table-striped table-hover">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div class="btn-area">
        <button onclick="delOldData()">delOldData</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
